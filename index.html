<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shir">
<meta name="theme-color" content="#0E1220">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Shir · Learn Hebrew Through Song</title>
<style>
:root{
  --ink:#0E1220;        /* night stage */
  --panel:#171D31;
  --panel-2:#1E2640;
  --line:#27304F;
  --text:#EFEBDF;       /* warm house-lights white */
  --dim:#8B93AC;
  --gold:#E9B44C;       /* transliteration / accent */
  --gold-deep:#C9922F;
  --rose:#E08795;       /* secondary */
  --teal:#6FC3B4;       /* success / known */
  --display:ui-serif, Georgia, "Times New Roman", serif;
  --body:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--ink);color:var(--text);font-family:var(--body);
  font-size:16px;line-height:1.5;overscroll-behavior-y:none;
  -webkit-font-smoothing:antialiased;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,textarea,select{font:inherit;color:var(--text)}
::placeholder{color:#5B6482}

/* ---------- App frame ---------- */
#app{display:flex;flex-direction:column;min-height:100dvh}
header.topbar{
  position:sticky;top:0;z-index:20;
  padding:calc(var(--safe-top) + 10px) 18px 10px;
  background:linear-gradient(to bottom, #0E1220 75%, rgba(14,18,32,.92));
  backdrop-filter:blur(8px);
  display:flex;align-items:baseline;justify-content:space-between;gap:12px;
  border-bottom:1px solid var(--line);
}
.brand{font-family:var(--display);font-size:22px;letter-spacing:.5px}
.brand .he{color:var(--gold);margin-inline-start:6px;font-size:20px}
.topbar .ctx{font-size:12px;color:var(--dim);text-align:right;max-width:55%;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
main{flex:1;padding:16px 16px calc(84px + var(--safe-bottom));max-width:640px;width:100%;margin:0 auto}

/* ---------- Tab bar ---------- */
nav.tabbar{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  display:flex;justify-content:space-around;
  padding:8px 6px calc(8px + var(--safe-bottom));
  background:rgba(23,29,49,.96);backdrop-filter:blur(12px);
  border-top:1px solid var(--line);
}
nav.tabbar button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:10.5px;color:var(--dim);padding:4px 0;border-radius:10px;
}
nav.tabbar button .ic{font-size:19px;line-height:1}
nav.tabbar button.on{color:var(--gold)}

/* ---------- Shared bits ---------- */
h2.screen{font-family:var(--display);font-size:24px;margin:6px 0 4px}
p.sub{color:var(--dim);font-size:13.5px;margin-bottom:16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:12px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  background:var(--gold);color:#1A1405;font-weight:600;font-size:15px;
  border-radius:12px;padding:12px 18px;width:100%;
}
.btn:active{background:var(--gold-deep)}
.btn.ghost{background:var(--panel-2);color:var(--text);border:1px solid var(--line)}
.btn.small{width:auto;padding:8px 14px;font-size:13.5px;border-radius:10px}
.btn.danger{background:none;border:1px solid #7A3A46;color:var(--rose)}
.row{display:flex;gap:10px}
.row .btn{flex:1}
.chip{
  display:inline-block;font-size:12px;padding:4px 11px;border-radius:999px;
  border:1px solid var(--line);color:var(--dim);background:var(--panel);
  margin:0 6px 6px 0;
}
.chip.on{border-color:var(--gold);color:var(--gold);background:rgba(233,180,76,.08)}
label.f{display:block;font-size:12.5px;color:var(--dim);margin:14px 0 6px;letter-spacing:.3px}
input.f,textarea.f,select.f{
  width:100%;background:var(--panel);border:1px solid var(--line);
  border-radius:12px;padding:11px 13px;font-size:15px;
}
textarea.f{min-height:110px;resize:vertical;line-height:1.6}
textarea.he{direction:rtl;font-size:17px}
.hint{font-size:12px;color:var(--dim);margin-top:6px;line-height:1.45}
.empty{
  text-align:center;color:var(--dim);padding:44px 20px;font-size:14px;line-height:1.7;
  border:1px dashed var(--line);border-radius:16px;
}
.empty .big{font-size:34px;display:block;margin-bottom:10px}
.divider-dots{display:flex;justify-content:center;gap:8px;margin:18px 0;color:var(--gold-deep);font-size:8px;letter-spacing:8px}

/* ---------- Songs list ---------- */
.songrow{display:flex;align-items:center;gap:13px;width:100%;text-align:left}
.songrow .disc{
  width:46px;height:46px;border-radius:50%;flex-shrink:0;
  background:radial-gradient(circle at 35% 35%, #2A3355, #151B30 70%);
  border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  color:var(--gold);font-family:var(--display);font-size:19px;
}
.songrow .meta{flex:1;min-width:0}
.songrow .t{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.songrow .a{font-size:13px;color:var(--dim)}
.songrow .n{font-size:11.5px;color:var(--dim);flex-shrink:0}

/* ---------- Study / lyric cards (the signature) ---------- */
.studyhead{margin:2px 0 14px}
.studyhead .t{font-family:var(--display);font-size:25px;line-height:1.2}
.studyhead .a{color:var(--gold);font-size:14px;margin-top:2px}
.modeswitch{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:14px}
.modeswitch button{flex:1;padding:8px 0;font-size:13.5px;color:var(--dim);border-radius:9px}
.modeswitch button.on{background:var(--panel-2);color:var(--text);font-weight:600}
.layers{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.lyric{
  background:var(--panel);border:1px solid var(--line);border-left:3px solid transparent;
  border-radius:14px;padding:13px 15px;margin-bottom:10px;
}
.lyric.section{background:none;border:none;padding:16px 4px 4px;color:var(--gold-deep);
  font-size:12px;letter-spacing:2.5px;text-transform:uppercase;text-align:center}
.lyric .he{direction:rtl;font-size:21px;line-height:1.55;font-weight:500}
.lyric .tr{color:var(--gold);font-size:15px;font-style:italic;margin-top:5px;line-height:1.5}
.lyric .en{color:var(--dim);font-size:13.5px;margin-top:5px;line-height:1.5}
.lyric.hidden-he .he,.lyric.hidden-tr .tr,.lyric.hidden-en .en{display:none}
.fontctl{display:flex;align-items:center;gap:8px;margin-left:auto}
.fontctl button{width:34px;height:30px;border:1px solid var(--line);border-radius:9px;background:var(--panel);color:var(--dim);font-size:15px}

/* ---------- Sing mode ---------- */
#singmode{
  position:fixed;inset:0;z-index:60;background:var(--ink);display:none;
  flex-direction:column;padding:calc(var(--safe-top) + 14px) 22px calc(20px + var(--safe-bottom));
}
#singmode.on{display:flex}
#singmode .top{display:flex;justify-content:space-between;align-items:center;color:var(--dim);font-size:13px}
#singmode .stage{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;gap:4px;min-height:0}
#singmode .cur .he{direction:rtl;font-size:min(9vw,36px);line-height:1.5;font-weight:600}
#singmode .cur .tr{color:var(--gold);font-style:italic;font-size:min(5.4vw,21px);margin-top:14px;line-height:1.5}
#singmode .cur .en{color:var(--dim);font-size:min(4.2vw,16px);margin-top:12px;line-height:1.5}
#singmode .next{margin-top:34px;opacity:.38;font-size:14px}
#singmode .next .he{direction:rtl;font-size:17px}
#singmode .navz{display:flex;gap:10px;margin-top:10px}
#singmode .navz button{
  flex:1;padding:15px 0;border-radius:14px;background:var(--panel);
  border:1px solid var(--line);font-size:16px;color:var(--text)
}
#singmode .navz button.primary{background:var(--gold);color:#1A1405;font-weight:700}
#singmode .sect{color:var(--gold-deep);letter-spacing:2px;font-size:12px;text-transform:uppercase;margin-bottom:14px}

/* ---------- Lessons ---------- */
.lesson h3{font-family:var(--display);font-size:18px;color:var(--gold);margin-bottom:8px}
.lesson p{font-size:14.5px;line-height:1.65;color:var(--text);margin-bottom:8px;white-space:pre-wrap}
.lesson .heq{direction:rtl;text-align:right;background:var(--panel-2);border-radius:10px;
  padding:9px 12px;font-size:17px;margin:8px 0}

/* ---------- Words ---------- */
.wsearch{position:sticky;top:calc(var(--safe-top) + 52px);z-index:10;background:var(--ink);padding:4px 0 10px}
.cathead{display:flex;align-items:baseline;justify-content:space-between;margin:18px 2px 8px}
.cathead h3{font-family:var(--display);font-size:17px;color:var(--gold)}
.cathead .ct{font-size:12px;color:var(--dim)}
.word{
  display:flex;align-items:baseline;gap:12px;width:100%;text-align:left;
  background:var(--panel);border:1px solid var(--line);border-radius:12px;
  padding:11px 14px;margin-bottom:8px;
}
.word .he{direction:rtl;font-size:19px;font-weight:600;min-width:0}
.word .tr{color:var(--gold);font-style:italic;font-size:13.5px}
.word .en{color:var(--dim);font-size:13.5px;margin-left:auto;text-align:right}
.wdetail .he{direction:rtl;font-size:30px;text-align:center;font-weight:600}
.wdetail .tr{color:var(--gold);font-style:italic;text-align:center;font-size:17px;margin-top:4px}
.wdetail .en{text-align:center;font-size:15px;margin-top:6px}
.wdetail .note{color:var(--dim);font-size:13.5px;margin-top:12px;line-height:1.6}
.wdetail .src{color:var(--dim);font-size:12px;margin-top:10px;text-align:center}

/* ---------- Flashcards ---------- */
.fc{
  background:var(--panel);border:1px solid var(--line);border-radius:20px;
  min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:28px 22px;text-align:center;position:relative;
}
.fc .cat{position:absolute;top:14px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-deep)}
.fc .he{direction:rtl;font-size:38px;font-weight:600;line-height:1.4}
.fc .tr{color:var(--gold);font-style:italic;font-size:20px;margin-top:12px}
.fc .en{font-size:19px;margin-top:10px}
.fc .tap{position:absolute;bottom:14px;color:var(--dim);font-size:12px}
.grade{display:flex;gap:9px;margin-top:14px}
.grade button{flex:1;padding:13px 0;border-radius:13px;font-size:14.5px;font-weight:600;border:1px solid var(--line)}
.grade .again{background:none;color:var(--rose);border-color:#7A3A46}
.grade .good{background:var(--panel-2);color:var(--text)}
.grade .easy{background:var(--teal);color:#0B2420;border-color:var(--teal)}
.fcstats{display:flex;justify-content:center;gap:18px;color:var(--dim);font-size:12.5px;margin:12px 0 16px}
.fcstats b{color:var(--text)}

/* ---------- Add / generate ---------- */
.stepnum{
  display:inline-flex;width:22px;height:22px;border-radius:50%;
  background:var(--gold);color:#1A1405;font-size:12.5px;font-weight:700;
  align-items:center;justify-content:center;margin-right:8px;flex-shrink:0
}
.step h3{display:flex;align-items:center;font-size:15.5px;margin-bottom:8px}
.online-pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--teal);
  border:1px solid #2A4A44;border-radius:999px;padding:3px 10px;margin-left:8px}
.offline-pill{color:var(--dim);border-color:var(--line)}
.toast{
  position:fixed;left:50%;transform:translateX(-50%);bottom:calc(96px + var(--safe-bottom));
  background:var(--panel-2);border:1px solid var(--gold-deep);color:var(--text);
  padding:10px 20px;border-radius:999px;font-size:13.5px;z-index:80;
  opacity:0;transition:opacity .25s;pointer-events:none;max-width:86%;text-align:center;
}
.toast.show{opacity:1}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">Shir<span class="he">שִׁיר</span></div>
    <div class="ctx" id="ctx"></div>
  </header>
  <main id="main"></main>
  <nav class="tabbar" id="tabbar"></nav>
</div>
<div id="singmode"></div>
<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
